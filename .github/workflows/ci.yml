# Continuous Integration (CI) Workflow
#
# Validates the integrity of the codebase on every push and pull request.
# This pipeline MUST succeed using only the contents of the repository.
# It does not and should not require any external secrets.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # Use npm ci for deterministic, faster, and safer installs in a CI environment.
        run: npm ci

      - name: Validate Configuration Prerequisites
        # Fail fast if the environment template is missing.
        run: |
          if [ ! -f .env.example ]; then
            echo ".env.example not found! The CI pipeline cannot proceed."
            exit 1
          fi
          # Create the .env file for the build step.
          cp .env.example .env

      - name: Lint Code
        run: npm run lint

      - name: Build Project
        # This step now succeeds because the previous step created a valid .env file.
        run: npm run build
